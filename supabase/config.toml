
# ============================================
# Auth configuration
# ============================================

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173", "http://127.0.0.1:5173", "http://localhost:5174", "http://127.0.0.1:5174"]

[auth.external]

# Google
[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_SECRET)"

# ============================================
# Edge Functions
# ============================================

[functions.process-document]
enabled = true
verify_jwt = false
import_map = "./functions/process-document/deno.json"
entrypoint = "./functions/process-document/index.ts"

[functions.ask-question]
enabled = true
verify_jwt = false
import_map = "./functions/ask-question/deno.json"
entrypoint = "./functions/ask-question/index.ts"

